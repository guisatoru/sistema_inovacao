services:
  - type: web
    name: sistema-testes-inovacao
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn promocao.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: sistema-testes-inovacao.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sistema-testes-inovacao.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
